[pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --nomigrations
    --tb=short
    --strict-markers
    -v
testpaths = tests
markers =
    unit: Pure unit tests — no HTTP, minimal DB
    integration: Full request/response cycle tests
    slow: Tests that take more than 1s
